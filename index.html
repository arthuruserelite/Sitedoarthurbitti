<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Links</title>

<style>
body {
    background-color: #121212;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.links-container {
    width: 100%;
    max-width: 350px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.link-card {
    border: 2px solid #00ff88;
    color: #00ff88;
    padding: 15px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
}

.link-card:hover {
    background: #00ff88;
    color: #121212;
}

.senha-container, .conteudo-secreto {
    display: none;
    flex-direction: column;
    gap: 10px;
}

#loading {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: #121212;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.loader {
    border: 4px solid #222;
    border-top: 4px solid #00ff88;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h2>Meus Links</h2>

<div class="links-container">
    <div class="link-card" onclick="mostrarSenha()">Área Restrita 🔒</div>

    <div id="senha" class="senha-container">
        <input type="password" id="input">
        <button onclick="entrar()">Entrar</button>
    </div>

    <div id="secreto" class="conteudo-secreto">
        <a href="#">Link 1</a>
        <a href="#">Link 2</a>
    </div>
</div>

<div id="loading">
    <div class="loader"></div>
    <p>Carregando...</p>
</div>

<script>
function mostrarSenha() {
    document.getElementById('senha').style.display = 'flex';
}

function entrar() {
    const senha = document.getElementById('input').value;

    if (senha === "07020401") {

        document.getElementById('loading').style.display = 'flex';

        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('secreto').style.display = 'flex';
        }, 1000);

    } else {
        alert("Senha errada");
    }
}
</script>

</body>
</html>
