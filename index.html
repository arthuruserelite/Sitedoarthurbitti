<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #00ff88;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 { font-size: 1.5rem; margin-bottom: 30px; }

        .links-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            text-decoration: none;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 16px;
        }

        .link-card:hover {
            background: #00ff88;
            color: #121212;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .senha-container {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
            animation: fadeIn 0.3s ease-out;
        }

        input {
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #222;
            color: white;
            text-align: center;
            outline: none;
        }

        button.btn-entrar {
            background: #00ff88;
            color: #121212;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <img src="https://github.com/identicons/user.png" alt="Foto" class="profile-pic">
    <h1>Meus Links</h1>

    <div class="links-container">
        <a href="https://www.instagram.com/acarllos_/" class="link-card" target="_blank">Instagram Principal</a>
        <a href="https://www.instagram.com/artheruth/" class="link-card" target="_blank">Instagram Secundário</a>
        <a href="mailto:abitticarlos@gmail.com" class="link-card" target="_blank">E-mail</a>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <div class="link-card" onclick="toggleFormSenha()">Aba Restrita 🔒</div>
            
            <div id="form-senha" class="senha-container">
                <input type="password" id="input-senha" placeholder="Senha de acesso">
                <button class="btn-entrar" onclick="validarAcesso()">Desbloquear</button>
            </div>
        </div>
    </div>

    <script>
        function toggleFormSenha() {
            const form = document.getElementById('form-senha');
            form.style.display = form.style.display === 'flex' ? 'none' : 'flex';
            if (form.style.display === 'flex') {
                document.getElementById('input-senha').focus();
            }
        }

        function validarAcesso() {
            const senha = document.getElementById('input-senha').value;

            const prefixo = "a9f3k2x_"; // você pode mudar isso

            const destino = prefixo + senha + ".html";

            window.location.href = destino;
        }

        document.getElementById('input-senha').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') validarAcesso();
        });
    </script>
</body>
</html>
