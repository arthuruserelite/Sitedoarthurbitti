<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #00ff88;
            margin-bottom: 15px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 30px; }

        .links-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Estilo dos Botões */
        .link-card {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            text-decoration: none;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 16px;
        }

        .link-card:hover {
            background: #00ff88;
            color: #121212;
            transform: scale(1.05);
        }

        /* Campo de Senha */
        .senha-container {
            display: none; /* Começa escondido */
            flex-direction: column;
            gap: 10px;
            margin-top: -5px;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 8px;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            outline: none;
            text-align: center;
        }

        button.btn-entrar {
            background: #00ff88;
            color: #121212;
            border: none;
            padding: 8px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <img src="https://github.com/identicons/user.png" alt="Foto" class="profile-pic">
    <h1>Meus Links</h1>

    <div class="links-container">
        
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <div class="link-card" onclick="toggleSenha()">Aba Restrita 🔒</div>
            
            <div id="campo-senha" class="senha-container">
                <input type="password" id="input-senha" placeholder="Digite a senha">
                <button class="btn-entrar" onclick="verificarSenha()">Entrar</button>
            </div>
        </div>

        <a href="https://www.instagram.com/acarllos_/" class="link-card" target="_blank">Instagram Principal</a>
        <a href="https://www.instagram.com/artheruth/" class="link-card" target="_blank">Instagram Secundário</a>

        <a href="mailto:abitticarlos@gmail.com" class="link-card" target="_blank">E-mail</a>
    </div>

    <script>
        // Abre e fecha o campo de senha
        function toggleSenha() {
            const container = document.getElementById('campo-senha');
            container.style.display = container.style.display === 'flex' ? 'none' : 'flex';
        }

        // Verifica a senha
        function verificarSenha() {
            const senhaDigitada = document.getElementById('input-senha').value;
            const senhaCorreta = "07020401";
            
            if (senhaDigitada === senhaCorreta) {
                // TROQUE O LINK ABAIXO PELO LINK DA SUA ABA RESTRITA
                window.location.href = "https://1drv.ms/v/c/b7955fde53ea9d7d/IQAFRVFqObE8Qbq9HuiuFvvAAef_-IXJf_fXBI5z_JANiRg?e=2zyawN";
            } else {
                alert("Senha incorreta! Tente novamente.");
            }
        }
    </script>

</body>
</html>
